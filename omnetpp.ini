[General]
# =============================================
# omnetpp.ini - Simulation Configuration
# CSL3080 Assignment-2: P2P CHORD Ring Network
# =============================================

network = assignment2.ChordNetwork

# Simulation time limit
sim-time-limit = 100s

# Random seed
seed-set = 0

# Number of clients (read from topo.txt at runtime by NetworkManager)
# This default is overridden dynamically - edit topo.txt to change N
**.numClients = 8

# Channel parameters (low latency links)
**.channel.delay = 1ms
**.channel.datarate = 100Mbps

# Logging
cmdenv-express-mode = false
cmdenv-output-file = simulation.log

# Output files
output-vector-file = results/ChordNetwork.vec
output-scalar-file = results/ChordNetwork.sca

[Config SmallNet]
description = "Small network with N=4"
**.numClients = 4

[Config MediumNet]
description = "Medium network with N=8"
**.numClients = 8

[Config LargeNet]
description = "Large network with N=16"
**.numClients = 16
